<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-wrapper">
        <header class="todo-header">
            <h1>Todo List</h1>
            <p>Voice-activated smart task organizer</p>
        </header>

        <div class="input-card">
            <form id="taskForm">
                <div class="input-row">
                    <input type="text" id="taskInput" placeholder="Try: 'Meeting with client tomorrow high priority'..." autocomplete="off" required>
                    <button type="button" id="voiceBtn" class="btn-voice" title="Speak Task">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 1v10M19 8a7 7 0 0 1-14 0"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                </div>
                
                <div class="meta-row">
                    <div class="meta-group">
                        <label>Priority</label>
                        <select id="taskPriority">
                            <option value="low">🟢 Low</option>
                            <option value="medium" selected>🟡 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>
                    <div class="meta-group">
                        <label>Due Date</label>
                        <input type="date" id="taskDate">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Deploy Task</button>
            </form>
            <div id="voiceStatus" class="voice-status">Listening...</div>
        </div>

        <nav class="filter-nav">
            <button class="filter-btn active" data-filter="all">All Tasks</button>
            <button class="filter-btn" data-filter="pending">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </nav>

        <main class="list-card">
            <ul id="taskList" class="task-list"></ul>
            <div id="emptyState" class="empty-state">
                <p>No active tasks in queue.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
